<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Painel de Métricas — Magnifica Humanitas</title>
  <style>
    body{font-family:Inter,Arial,sans-serif;background:#f2f4f6;margin:0;color:#151515}
    .wrap{max-width:980px;margin:2rem auto;padding:0 1rem}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem}
    .card{background:#fff;border:1px solid #c8d2dc;border-radius:12px;padding:1rem}h1{margin-bottom:1rem}.small{color:#65748a}
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Métricas locais</h1>
    <p class="small" id="status">Carregando dados...</p>
    <div class="grid" id="cards"></div>
  </main>
  <script>
    const labels={page_view_local:'Visualizações locais',read_vatican:'Leitura no site da Santa Sé',download_pdf:'Downloads de PDF',adhesion_submit:'Envios de adesão',contact_click:'Cliques no e-mail',nav_click:'Cliques de navegação'};
    fetch('../metrics.php?summary=1').then(r=>{if(!r.ok)throw new Error();return r.json()}).then(data=>{const cards=document.getElementById('cards');const events=(data&&data.events)||{};Object.entries(labels).forEach(([k,l])=>{const n=(events[k]&&events[k].count)||0;const c=document.createElement('article');c.className='card';c.innerHTML=`<h2>${l}</h2><p><strong>${n}</strong></p>`;cards.appendChild(c)});document.getElementById('status').textContent='Resumo atualizado.'}).catch(()=>{document.getElementById('status').textContent='Falha ao carregar métricas.'});
  </script>
</body>
</html>
