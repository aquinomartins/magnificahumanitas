<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Painel de Métricas — Magnifica Humanitas</title>
  <style>
    body{font-family:system-ui,Segoe UI,sans-serif;background:#f7f1e3;margin:0;color:#3d3a36}
    .wrap{max-width:920px;margin:2rem auto;padding:0 1rem}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem}
    .card{background:#fffaf0;border:1px solid #d7cebf;border-radius:12px;padding:1rem}
    h1{margin-bottom:1.5rem}
    .small{color:#6f675d}
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Métricas locais</h1>
    <p class="small" id="status">Carregando dados...</p>
    <div class="grid" id="cards"></div>
  </main>
  <script>
    const labels = {
      page_view_local: 'Visualizações locais',
      read_vatican: 'Cliques em “Ler a Encíclica”',
      chapter_index_view: 'Visualização do índice de capítulos',
      chapter_1_view: 'Visualização Capítulo 1',
      chapter_2_view: 'Visualização Capítulo 2',
      chapter_3_view: 'Visualização Capítulo 3',
      chapter_4_view: 'Visualização Capítulo 4',
      chapter_5_view: 'Visualização Capítulo 5',
      download_pdf: 'Cliques em “Baixar PDF”',
      adhesion_submit: 'Envios de adesão',
      contact_click: 'Cliques de contato',
      visual_placeholder_click: 'Cliques nos espaços visuais'
    };

    fetch('../metrics.php?summary=1')
      .then((r) => {
        if (!r.ok) throw new Error('Falha ao carregar métricas.');
        return r.json();
      })
      .then((data) => {
        const cards = document.getElementById('cards');
        const events = (data && data.events) || {};
        Object.entries(labels).forEach(([key, label]) => {
          const count = events[key] && events[key].count ? events[key].count : 0;
          const card = document.createElement('article');
          card.className = 'card';
          card.innerHTML = `<h2>${label}</h2><p><strong>${count}</strong></p>`;
          cards.appendChild(card);
        });
        document.getElementById('status').textContent = 'Resumo atualizado com sucesso.';
      })
      .catch(() => {
        document.getElementById('status').textContent = 'Não foi possível carregar o resumo. Em alguns servidores, a leitura pode depender do endpoint ../metrics.php?summary=1 estar acessível.';
      });
  </script>
</body>
</html>
